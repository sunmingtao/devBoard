---
- name: Backup k3s state on homelab server
  template:
    src: backup-k3s-state.sh.j2
    dest: "{{ local_bin }}/backup-k3s-state.sh"
    owner: root
    group: root
    mode: "0755"

- name: Install backup service
  copy:
    dest: /etc/systemd/system/backup-k3s-state.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Backup k3s state

      [Service]
      Type=oneshot
      ExecStart={{ local_bin }}/backup-k3s-state.sh

- name: Install backup timer
  copy:
    dest: /etc/systemd/system/backup-k3s-state.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Run backup-k3s-state.service every 24 hours

      [Timer]
      OnCalendar=daily
      Persistent=true
      Unit=backup-k3s-state.service

      [Install]
      WantedBy=timers.target

- name: Reload systemd and enable backup timer
  systemd:
    daemon_reload: yes
    name: backup-k3s-state.timer
    enabled: yes
    state: started