---
argocd_namespace: argocd
argocd_kubectl: /usr/local/bin/kubectl
argocd_kubeconfig: /etc/rancher/k3s/k3s.yaml

argocd_local_gitops_root: "{{ playbook_dir }}/../../../deploy/gitops"
argocd_remote_manifest_root: /tmp/devboard-gitops
argocd_remote_argocd_dir: "{{ argocd_remote_manifest_root }}/argocd"
argocd_remote_apps_dir: "{{ argocd_remote_manifest_root }}/apps"

argocd_sops_age_key_file: "{{ lookup('env', 'SOPS_AGE_KEY_FILE') | default(lookup('env', 'HOME') + '/.config/sops/age/keys.txt', true) }}"
argocd_sops_age_secret: sops-age
argocd_sops_age_secret_key: keys.txt

argocd_install_timeout: 300s
argocd_crd_timeout: 180s
argocd_app_crd_timeout: 180s

argocd_core_app_manifests:
  - path: k3s/argo-rollouts.yaml
    name: argo-rollouts-k3s
  - path: k3s/external-secrets.yaml
    name: external-secrets-k3s
  - path: k3s/ingress-nginx.yaml
    name: ingress-nginx-k3s

argocd_bootstrap_k3s_apps: false
argocd_devboard_app_manifests:
  - path: k3s/devboard-kafka-dev.yaml
    name: devboard-kafka-dev-k3s
  - path: k3s/devboard-kafka-prod.yaml
    name: devboard-kafka-prod-k3s
  - path: k3s/devboard-dev.yaml
    name: devboard-dev-k3s
  - path: k3s/devboard-prod.yaml
    name: devboard-prod-k3s

argocd_bootstrap_monitoring: false
argocd_monitoring_app_manifests:
  - path: k3s/devboard-monitoring.yaml
    name: devboard-monitoring-k3s
  - path: k3s/devboard-kafka-exporter-dev.yaml
    name: devboard-kafka-exporter-dev-k3s
  - path: k3s/devboard-kafka-exporter-prod.yaml
    name: devboard-kafka-exporter-prod-k3s
  - path: k3s/observability.yaml
    name: observability-k3s

argocd_k3s_app_manifests: >-
  {{
    argocd_core_app_manifests
    + argocd_devboard_app_manifests
    + (argocd_monitoring_app_manifests if argocd_bootstrap_monitoring | bool else [])
  }}

argocd_ui_access_method: port-forward
argocd_ui_local_port: 8080
argocd_ui_service_port: 443
argocd_initial_admin_secret: argocd-initial-admin-secret
