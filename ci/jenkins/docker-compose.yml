version: '3.8'

services:
  jenkins:
    build: .
    container_name: jenkins
    restart: unless-stopped

    environment:
      - TZ=Australia/Sydney
      - JAVA_OPTS=-Duser.timezone=Australia/Sydney
    ports:
      - "8085:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/jacky:/jacky-home
    group_add:
      - "1001"

volumes:
  jenkins_home:
    external: true
    name: jenkins_home