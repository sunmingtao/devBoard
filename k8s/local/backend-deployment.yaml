apiVersion: apps/v1
kind: Deployment
metadata:
  name: devboard-backend
  namespace: devboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devboard-backend
  template:
    metadata:
      labels:
        app: devboard-backend
    spec:
      containers:
        - name: backend
          image: sunmingtao/devboard-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: devboard-backend-config
                  key: SPRING_PROFILES_ACTIVE
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: devboard-backend-config
                  key: DATABASE_URL
            - name: DATABASE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: devboard-backend-config
                  key: DATABASE_USERNAME
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: devboard-backend-secret
                  key: DATABASE_PASSWORD
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: devboard-backend-config
                  key: CORS_ALLOWED_ORIGINS
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20