apiVersion: v1
kind: ConfigMap
metadata:
  name: devboard-backend-config
  namespace: devboard
data:
  SPRING_PROFILES_ACTIVE: "mysql"
  DATABASE_URL: "jdbc:mysql://mysql:3306/devboard?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
  DATABASE_USERNAME: "devuser"
  CORS_ALLOWED_ORIGINS: "http://127.0.0.1:30080,http://localhost:30080"