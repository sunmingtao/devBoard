services:
  mysql:
    image: mysql:8.0
    container_name: devboard-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: devboard
      MYSQL_USER: devboard_user
      MYSQL_PASSWORD: devboard_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
    networks:
      - devboard-network

  backend:
    image: sunmingtao/devboard-backend:${IMAGE_TAG}
    container_name: devboard-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/devboard?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: devboard_user
      SPRING_DATASOURCE_PASSWORD: devboard_pass
      CORS_ALLOWED_ORIGINS: http://139.180.161.144:3000,http://localhost:3000
    depends_on:
      - mysql
    networks:
      - devboard-network

  frontend:
    image: sunmingtao/devboard-frontend:${IMAGE_TAG}
    container_name: devboard-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - devboard-network

networks:
  devboard-network:
    driver: bridge

volumes:
  mysql_data: