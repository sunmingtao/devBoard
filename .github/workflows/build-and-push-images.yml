name: Build and Push Images

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-and-push-images.yml"
      - "apps/backend/**"
      - "apps/frontend/**"
      - "apps/event-service/**"
      - "apps/event-frontend/**"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag override. Defaults to the short commit SHA."
        required: false
        type: string
      push_latest:
        description: "Also publish latest tags for manual recovery/testing."
        required: true
        default: false
        type: boolean

concurrency:
  group: build-and-push-images-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

env:
  REGISTRY: docker.io
  IMAGE_NAMESPACE: sunmingtao
  PLATFORM: linux/amd64

jobs:
  build-and-push:
    name: Build and push ${{ matrix.service }}
    if: >-
      github.event_name != 'push' ||
      (
        !contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]')
      )
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            image: devboard-backend
            context: apps/backend
          - service: frontend
            image: devboard-frontend
            context: apps/frontend
          - service: event-service
            image: devboard-event-service
            context: apps/event-service
          - service: event-frontend
            image: devboard-event-frontend
            context: apps/event-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: image
        shell: bash
        env:
          REQUESTED_TAG: ${{ github.event.inputs.image_tag || '' }}
          PUSH_LATEST: ${{ github.event.inputs.push_latest || 'false' }}
        run: |
          set -euo pipefail

          image_tag="${REQUESTED_TAG:-${GITHUB_SHA::7}}"

          if [[ ! "${image_tag}" =~ ^[A-Za-z0-9_.-]+$ ]]; then
            echo "Invalid image tag: ${image_tag}" >&2
            exit 1
          fi

          image_ref="${REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.image }}"

          {
            echo "image_tag=${image_tag}"
            echo "tags<<EOF"
            echo "${image_ref}:${image_tag}"
            if [[ "${PUSH_LATEST}" == "true" ]]; then
              echo "${image_ref}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      - name: Summarize image
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### ${{ matrix.service }}"
            echo ""
            echo "Pushed:"
            echo "${{ steps.image.outputs.tags }}"
          } >> "${GITHUB_STEP_SUMMARY}"

  update-dev-k3s-manifest:
    name: Update dev k3s manifest
    needs: build-and-push
    if: needs.build-and-push.result == 'success' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      KUSTOMIZATION: deploy/k8s/overlays/dev-k3s/kustomization.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Prepare image tag
        id: image
        shell: bash
        env:
          REQUESTED_TAG: ${{ github.event.inputs.image_tag || '' }}
        run: |
          set -euo pipefail

          image_tag="${REQUESTED_TAG:-${GITHUB_SHA::7}}"

          if [[ ! "${image_tag}" =~ ^[A-Za-z0-9_.-]+$ ]]; then
            echo "Invalid image tag: ${image_tag}" >&2
            exit 1
          fi

          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"

      - name: Update dev k3s image tags
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.image.outputs.image_tag }}
        run: |
          set -euo pipefail

          sed -i -E "s#value: ${IMAGE_NAMESPACE}/devboard-backend:.*#value: ${IMAGE_NAMESPACE}/devboard-backend:${IMAGE_TAG}#" "${KUSTOMIZATION}"
          sed -i -E "/path: \\/spec\\/template\\/metadata\\/labels\\/app\\.kubernetes\\.io~1version/{n;s#value: .*#value: ${IMAGE_TAG}#;}" "${KUSTOMIZATION}"
          sed -i -E "s#value: ${IMAGE_NAMESPACE}/devboard-frontend:.*#value: ${IMAGE_NAMESPACE}/devboard-frontend:${IMAGE_TAG}#" "${KUSTOMIZATION}"
          sed -i -E "s#value: ${IMAGE_NAMESPACE}/devboard-event-service:.*#value: ${IMAGE_NAMESPACE}/devboard-event-service:${IMAGE_TAG}#" "${KUSTOMIZATION}"
          sed -i -E "s#value: ${IMAGE_NAMESPACE}/devboard-event-frontend:.*#value: ${IMAGE_NAMESPACE}/devboard-event-frontend:${IMAGE_TAG}#" "${KUSTOMIZATION}"

          git diff -- "${KUSTOMIZATION}"

      - name: Commit dev k3s manifest update
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.image.outputs.image_tag }}
        run: |
          set -euo pipefail

          if git diff --quiet -- "${KUSTOMIZATION}"; then
            echo "Dev k3s manifest already points to ${IMAGE_TAG}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${KUSTOMIZATION}"
          git commit -m "chore(gitops): update dev k3s image tag to ${IMAGE_TAG} [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
