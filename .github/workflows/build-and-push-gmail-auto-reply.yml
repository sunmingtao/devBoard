name: Build and Push Gmail Auto Reply

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-and-push-gmail-auto-reply.yml"

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: scripts/gmail-api
          file: scripts/gmail-api/Dockerfile
          push: true
          tags: |
            sunmingtao/gmail-auto-reply:latest
            sunmingtao/gmail-auto-reply:${{ github.sha }}
