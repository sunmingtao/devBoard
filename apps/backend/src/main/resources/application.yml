spring:
  application:
    name: devboard
  
  # Default profile (uses H2)
  profiles:
    active: dev
  
  # H2 Database Configuration (Development)
  datasource:
    url: jdbc:h2:mem:devboard
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  
  # H2 Console (for development)
  h2:
    console:
      enabled: true
      path: /h2-console

  # Kafka Producer Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# DevBoard Application Configuration
devboard:
  app:
    jwtSecret: ${JWT_SECRET:defaultSecretKeyForDevelopmentOnly}
    jwtExpirationMs: ${JWT_EXPIRATION_MS:86400000} # 24 hours
  kafka:
    topics:
      task-events: ${TASK_EVENTS_TOPIC:devboard.tasks}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /actuator
