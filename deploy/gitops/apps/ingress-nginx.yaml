apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: devboard
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.14.1
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          ingressClassResource:
            name: nginx
            enabled: true
            default: true
          ingressClass: nginx
          service:
            type: NodePort
            nodePorts:
              http: 30080
              https: 30443
          admissionWebhooks:
            patch:
              enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
