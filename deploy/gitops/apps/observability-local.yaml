apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-local
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
  labels:
    app.kubernetes.io/name: observability-local
    app.kubernetes.io/part-of: devboard
spec:
  project: default
  source:
    repoURL: https://github.com/sunmingtao/devBoard.git
    targetRevision: main
    path: deploy/observability/local
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
