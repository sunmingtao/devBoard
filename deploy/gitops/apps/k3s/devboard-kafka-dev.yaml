apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devboard-kafka-dev-k3s
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  labels:
    app.kubernetes.io/name: devboard-kafka
    app.kubernetes.io/part-of: devboard
    devboard.io/environment: dev-k3s
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: kafka
    targetRevision: 30.1.8
    helm:
      releaseName: devboard-kafka
      values: |
        global:
          security:
            allowInsecureImages: true

        image:
          registry: docker.io
          repository: bitnamilegacy/kafka

        controller:
          replicaCount: 1
          persistence:
            enabled: true
            storageClass: local-path
            size: 5Gi
          heapOpts: "-Xmx384m -Xms384m"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 750m
              memory: 768Mi

        broker:
          replicaCount: 0
          pdb:
            create: false

        listeners:
          client:
            protocol: PLAINTEXT

        extraConfigYaml:
          default.replication.factor: 1
          offsets.topic.replication.factor: 1
          transaction.state.log.replication.factor: 1
          transaction.state.log.min.isr: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: devboard-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

