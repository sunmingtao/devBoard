apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devboard-kafka-exporter
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  labels:
    app.kubernetes.io/name: devboard-kafka-exporter
    app.kubernetes.io/part-of: devboard
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus-kafka-exporter
      targetRevision: 3.0.1
      helm:
        releaseName: devboard-kafka-exporter
        valueFiles:
          - $values/deploy/observability/eks/kafka-exporter-values.yaml
    - repoURL: https://github.com/sunmingtao/devBoard.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
