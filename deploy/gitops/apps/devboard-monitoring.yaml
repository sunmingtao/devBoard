apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devboard-monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=true
    argocd.argoproj.io/sync-wave: "10"
  labels:
    app.kubernetes.io/name: devboard-monitoring
    app.kubernetes.io/part-of: devboard
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 84.3.0
      helm:
        releaseName: devboard-monitoring
        valueFiles:
          - $values/deploy/observability/eks/kube-prometheus-stack-values.yaml
    - repoURL: https://github.com/sunmingtao/devBoard.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
