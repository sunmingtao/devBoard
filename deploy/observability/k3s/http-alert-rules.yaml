apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: devboard-http-alerts
  namespace: monitoring
  labels:
    release: devboard-monitoring
spec:
  groups:
    - name: devboard.http.rules
      rules:
        - alert: DevBoardBackendHighErrorRate
          expr: |
            (
              sum(rate(http_server_requests_seconds_count{namespace=~"devboard-dev|devboard-prod", job="devboard-backend", uri!="/actuator/prometheus", status=~"5.."}[5m]))
              /
              sum(rate(http_server_requests_seconds_count{namespace=~"devboard-dev|devboard-prod", job="devboard-backend", uri!="/actuator/prometheus"}[5m]))
            ) > 0.05
            and
            sum(rate(http_server_requests_seconds_count{namespace=~"devboard-dev|devboard-prod", job="devboard-backend", uri!="/actuator/prometheus"}[5m])) > 0.1
          for: 5m
          labels:
            severity: warning
            service: backend
          annotations:
            summary: DevBoard backend HTTP error rate is high
            description: More than 5% of backend HTTP requests are returning 5xx responses for 5 minutes.

        - alert: DevBoardBackendHighLatency
          expr: |
            (
              sum(rate(http_server_requests_seconds_sum{namespace=~"devboard-dev|devboard-prod", job="devboard-backend", uri!="/actuator/prometheus"}[5m]))
              /
              sum(rate(http_server_requests_seconds_count{namespace=~"devboard-dev|devboard-prod", job="devboard-backend", uri!="/actuator/prometheus"}[5m]))
            ) > 0.75
            and
            sum(rate(http_server_requests_seconds_count{namespace=~"devboard-dev|devboard-prod", job="devboard-backend", uri!="/actuator/prometheus"}[5m])) > 0.1
          for: 5m
          labels:
            severity: warning
            service: backend
          annotations:
            summary: DevBoard backend HTTP latency is high
            description: Average backend request duration is above 750ms for 5 minutes.

        - alert: DevBoardActuatorScrapeFailure
          expr: |
            up{namespace=~"devboard-dev|devboard-prod", job=~"devboard-backend|devboard-event-service"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: DevBoard actuator scrape is failing
            description: Prometheus cannot scrape actuator metrics for {{ $labels.job }} in {{ $labels.namespace }}.

        - alert: DevBoardServiceUnavailable
          expr: |
            increase(http_server_requests_seconds_count{namespace=~"devboard-dev|devboard-prod", job=~"devboard-backend|devboard-event-service", uri=~"/api/health|/actuator/health", status=~"5.."}[5m]) > 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: DevBoard service health endpoint is returning 5xx
            description: The {{ $labels.job }} health endpoint {{ $labels.uri }} in {{ $labels.namespace }} returned one or more 5xx responses in the last 5 minutes.
