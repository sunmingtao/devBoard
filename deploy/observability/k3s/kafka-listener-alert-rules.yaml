apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: devboard-kafka-listener-alerts
  namespace: monitoring
  labels:
    release: devboard-monitoring
spec:
  groups:
    - name: devboard.kafka.listener.rules
      rules:
        - alert: DevBoardKafkaNoMessagesConsumed
          expr: |
            sum by (namespace) (
              rate(spring_kafka_listener_seconds_count{namespace=~"devboard-dev|devboard-prod", job="devboard-event-service", result="success"}[10m])
            ) == 0
          for: 15m
          labels:
            severity: warning
            service: event-service
          annotations:
            summary: DevBoard event-service is not consuming Kafka messages
            description: The event-service Kafka listener in {{ $labels.namespace }} has not recorded a successful message consumption for 15 minutes.

        - alert: DevBoardKafkaListenerErrors
          expr: |
            sum by (namespace) (
              increase(spring_kafka_listener_seconds_count{namespace=~"devboard-dev|devboard-prod", job="devboard-event-service", result!="success"}[5m])
            ) > 0
          for: 2m
          labels:
            severity: warning
            service: event-service
          annotations:
            summary: DevBoard event-service Kafka listener is failing
            description: The event-service Kafka listener in {{ $labels.namespace }} recorded one or more non-success listener results in the last 5 minutes.
