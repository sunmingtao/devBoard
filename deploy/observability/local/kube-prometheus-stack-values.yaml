grafana:
  adminUser: admin
  adminPassword: admin
  defaultDashboardsTimezone: browser
  service:
    type: ClusterIP
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: monitoring
  serviceMonitor:
    interval: 10s
    scrapeTimeout: 10s
  additionalDataSources:
    - name: DevBoard Prometheus
      type: prometheus
      uid: devboard-prometheus
      access: proxy
      url: http://devboard-monitoring-kube-p-prometheus.monitoring:9090/
      isDefault: false

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    retention: 7d
    scrapeInterval: 10s

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: demo-null
      group_by:
        - namespace
        - alertname
        - job
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: demo-null
          matchers:
            - alertname = "Watchdog"
          repeat_interval: 12h
    receivers:
      - name: demo-null

    # Optional Slack receiver:
    # 1. Create a secret outside git, for example:
    #    kubectl create secret generic alertmanager-slack-webhook \
    #      -n monitoring \
    #      --from-literal=webhook-url='https://hooks.slack.com/services/...'
    # 2. Mount that secret with alertmanager.alertmanagerSpec.secrets.
    # 3. Add a slack_configs entry that reads /etc/alertmanager/secrets/alertmanager-slack-webhook/webhook-url.
    #
    # Optional email receiver:
    # 1. Create an SMTP password secret outside git.
    # 2. Mount that secret with alertmanager.alertmanagerSpec.secrets.
    # 3. Add an email_configs entry that reads the mounted password file.
  alertmanagerSpec:
    retention: 120h
