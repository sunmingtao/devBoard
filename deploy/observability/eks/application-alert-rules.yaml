apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: devboard-application-alerts
  namespace: monitoring
  labels:
    release: devboard-monitoring
spec:
  groups:
    - name: devboard.application.rules
      rules:
        - alert: DevBoardBackendUnavailable
          expr: |
            (kube_deployment_spec_replicas{namespace="devboard", deployment="devboard-backend"} > 0)
            and on (namespace, deployment)
            (kube_deployment_status_replicas_available{namespace="devboard", deployment="devboard-backend"} < kube_deployment_spec_replicas{namespace="devboard", deployment="devboard-backend"})
          for: 2m
          labels:
            severity: critical
            service: backend
          annotations:
            summary: DevBoard backend has no available replica
            description: The devboard-backend Deployment has fewer available replicas than desired for more than 2 minutes.

        - alert: DevBoardEventServiceUnavailable
          expr: |
            (kube_deployment_spec_replicas{namespace="devboard", deployment="devboard-event-service"} > 0)
            and on (namespace, deployment)
            (kube_deployment_status_replicas_available{namespace="devboard", deployment="devboard-event-service"} < kube_deployment_spec_replicas{namespace="devboard", deployment="devboard-event-service"})
          for: 2m
          labels:
            severity: critical
            service: event-service
          annotations:
            summary: DevBoard event-service has no available replica
            description: The devboard-event-service Deployment has fewer available replicas than desired for more than 2 minutes.

        - alert: DevBoardFrontendUnavailable
          expr: |
            (kube_deployment_spec_replicas{namespace="devboard", deployment=~"devboard-frontend|devboard-event-frontend"} > 0)
            and on (namespace, deployment)
            (kube_deployment_status_replicas_available{namespace="devboard", deployment=~"devboard-frontend|devboard-event-frontend"} < kube_deployment_spec_replicas{namespace="devboard", deployment=~"devboard-frontend|devboard-event-frontend"})
          for: 2m
          labels:
            severity: critical
            service: frontend
          annotations:
            summary: DevBoard frontend has no available replica
            description: A DevBoard frontend Deployment has fewer available replicas than desired for more than 2 minutes.

        - alert: DevBoardPodRestarting
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="devboard", pod=~"devboard-(backend|event-service|frontend|event-frontend)-.*"}[15m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: DevBoard pod container restarted
            description: Container {{ $labels.container }} in pod {{ $labels.pod }} restarted within the last 15 minutes.

        - alert: DevBoardHighContainerCpu
          expr: |
            (
              sum by (namespace, pod, container) (
                rate(container_cpu_usage_seconds_total{namespace="devboard", container!="", container!="POD", pod=~"devboard-(backend|event-service|frontend|event-frontend)-.*"}[5m])
              )
              /
              sum by (namespace, pod, container) (
                kube_pod_container_resource_limits{namespace="devboard", resource="cpu", unit="core", pod=~"devboard-(backend|event-service|frontend|event-frontend)-.*"} > 0
              )
            ) > 0.8
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: DevBoard container CPU usage is high
            description: Container {{ $labels.container }} in pod {{ $labels.pod }} is using more than 80% of its CPU limit for 10 minutes.

        - alert: DevBoardHighContainerMemory
          expr: |
            (
              sum by (namespace, pod, container) (
                container_memory_working_set_bytes{namespace="devboard", container!="", container!="POD", pod=~"devboard-(backend|event-service|frontend|event-frontend)-.*"}
              )
              /
              sum by (namespace, pod, container) (
                kube_pod_container_resource_limits{namespace="devboard", resource="memory", unit="byte", pod=~"devboard-(backend|event-service|frontend|event-frontend)-.*"} > 0
              )
            ) > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: DevBoard container memory usage is high
            description: Container {{ $labels.container }} in pod {{ $labels.pod }} is using more than 85% of its memory limit for 10 minutes.
