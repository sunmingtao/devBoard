services:
  certbot:
    image: certbot/certbot:latest
    container_name: devboard-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - devboard-network

  backend:
    image: sunmingtao/devboard-backend:${IMAGE_TAG}
    container_name: devboard-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      TASK_EVENTS_TOPIC: ${TASK_EVENTS_TOPIC:-devboard.tasks}
    networks:
      - devboard-network

  event-service:
    image: sunmingtao/devboard-event-service:${IMAGE_TAG}
    container_name: devboard-event-service
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-event-service}
      TASK_EVENTS_TOPIC: ${TASK_EVENTS_TOPIC:-devboard.tasks}
    networks:
      - devboard-network

  frontend:
    image: sunmingtao/devboard-frontend:${IMAGE_TAG}
    container_name: devboard-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"
      - "${FRONTEND_HTTPS_PORT:-443}:443"
    depends_on:
      - backend
    volumes:
      - ./active.nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - devboard-network

networks:
  devboard-network:
    name: devboard-network
    driver: bridge
