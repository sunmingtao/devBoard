services:
  certbot:
    image: certbot/certbot:latest
    container_name: devboard-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - devboard-network

  backend:
    image: sunmingtao/devboard-backend:${IMAGE_TAG}
    container_name: devboard-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    networks:
      - devboard-network

  frontend:
    image: sunmingtao/devboard-frontend:${IMAGE_TAG}
    container_name: devboard-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"
      - "${FRONTEND_HTTPS_PORT:-443}:443"
    depends_on:
      - backend
    volumes:
      - ./active.nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - devboard-network

networks:
  devboard-network:
    driver: bridge
