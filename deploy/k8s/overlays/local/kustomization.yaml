apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: devboard

resources:
  - ../../base
  - mysql-deployment.yaml
  - mysql-service.yaml
  - mysql-pvc.yaml
  - mysql-secret.yaml
  - backend-configmap.yaml
  - backend-secret.yaml
  - event-service-configmap.yaml
  - frontend-nginx-configmap.yaml
  - ingress.yaml

patches:
  - target:
      kind: Rollout
      name: devboard-backend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: sunmingtao/devboard-backend:latest
      - op: add
        path: /spec/strategy/canary/trafficRouting
        value:
          nginx:
            stableIngress: devboard-ingress
  - target:
      kind: Deployment
      name: devboard-frontend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: sunmingtao/devboard-frontend:latest
  - target:
      kind: Deployment
      name: devboard-event-service
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: sunmingtao/devboard-event-service:latest
  - target:
      kind: Deployment
      name: devboard-event-frontend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: sunmingtao/devboard-event-frontend:latest
