apiVersion: v1
kind: ConfigMap
metadata:
  name: devboard-backend-config
  namespace: devboard
data:
  SPRING_PROFILES_ACTIVE: "mysql"
  DATABASE_URL: "jdbc:mysql://${DB_HOST}:3306/devboard?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
  DATABASE_USERNAME: "devboard_user"
  CORS_ALLOWED_ORIGINS: "http://PLACEHOLDER_LOADBALANCER_DNS"
  KAFKA_BOOTSTRAP_SERVERS: "devboard-kafka.devboard.svc.cluster.local:9092"
  TASK_EVENTS_TOPIC: "devboard.tasks"
