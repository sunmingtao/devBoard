apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: devboard-dev

resources:
  - ../../base
  - mysql-deployment.yaml
  - mysql-service.yaml
  - mysql-pvc.yaml
  - backend-configmap.yaml
  - event-service-configmap.yaml
  - frontend-nginx-configmap.yaml
  - ingress.yaml

generators:
  - secrets-generator.yaml

patches:
  - target:
      kind: Namespace
      name: devboard
    patch: |-
      - op: replace
        path: /metadata/name
        value: devboard-dev
  - target:
      kind: Rollout
      name: devboard-backend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: sunmingtao/devboard-backend:f4a3e0b
      - op: replace
        path: /spec/template/metadata/labels/app.kubernetes.io~1version
        value: f4a3e0b
      - op: add
        path: /spec/strategy/canary/trafficRouting
        value:
          nginx:
            stableIngress: devboard-ingress
  - target:
      kind: Deployment
      name: devboard-frontend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: sunmingtao/devboard-frontend:f4a3e0b
  - target:
      kind: Deployment
      name: devboard-event-service
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: sunmingtao/devboard-event-service:f4a3e0b
  - target:
      kind: Deployment
      name: devboard-event-frontend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: sunmingtao/devboard-event-frontend:f4a3e0b