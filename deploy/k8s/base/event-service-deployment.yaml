apiVersion: apps/v1
kind: Deployment
metadata:
  name: devboard-event-service
  namespace: devboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devboard-event-service
  template:
    metadata:
      labels:
        app: devboard-event-service
    spec:
      containers:
        - name: event-service
          image: sunmingtao/devboard-event-service:${IMAGE_TAG}
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: devboard-event-service-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KAFKA_CONSUMER_GROUP
              valueFrom:
                configMapKeyRef:
                  name: devboard-event-service-config
                  key: KAFKA_CONSUMER_GROUP
            - name: TASK_EVENTS_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: devboard-event-service-config
                  key: TASK_EVENTS_TOPIC
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: devboard-event-service-config
                  key: DATABASE_URL
            - name: DATABASE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: devboard-event-service-config
                  key: DATABASE_USERNAME
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: devboard-backend-secret
                  key: DATABASE_PASSWORD
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            periodSeconds: 10
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
