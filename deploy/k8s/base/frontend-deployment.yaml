apiVersion: apps/v1
kind: Deployment
metadata:
  name: devboard-frontend
  namespace: devboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devboard-frontend
  template:
    metadata:
      labels:
        app: devboard-frontend
    spec:
      containers:
        - name: frontend
          image: sunmingtao/devboard-frontend:${IMAGE_TAG}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: nginx-config
          configMap:
            name: devboard-frontend-nginx-config