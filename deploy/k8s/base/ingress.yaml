apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devboard-ingress
  namespace: devboard
spec:
  rules:
    - host: devboard.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devboard-frontend
                port:
                  number: 80

          - path: /api
            pathType: Prefix
            backend:
              service:
                name: devboard-backend
                port:
                  number: 8080